<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff View — Matcha Popup</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --matcha: #4a7c59;
    --matcha-light: #6a9e78;
    --matcha-pale: #d4e8d8;
    --matcha-dark: #2d5e3a;
    --cream: #faf6ef;
    --bg: #111a13;
    --surface: #1a2a1d;
    --surface2: #223028;
    --border: rgba(74,124,89,0.2);
    --text: #e8f0e9;
    --muted: #7a9080;
    --ready: #f0c040;
    --done: #5a9e6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .topbar h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.3rem;
    color: var(--text);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #5fce7a;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }

  .stats {
    display: flex;
    gap: 1.2rem;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1;
  }

  .stat-num.pending { color: #f0c040; }
  .stat-num.done { color: var(--matcha-light); }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.1rem;
  }

  .divider { width: 1px; height: 32px; background: var(--border); }

  /* Clear button */
  .clear-btn {
    background: rgba(192,57,43,0.12);
    border: 1px solid rgba(192,57,43,0.25);
    color: #e07060;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { background: rgba(192,57,43,0.22); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    padding: 1rem 1.5rem 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    color: var(--matcha-light);
    border-bottom-color: var(--matcha-light);
  }

  /* Order grid */
  .main {
    flex: 1;
    padding: 1.2rem 1.5rem;
    overflow-y: auto;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { font-size: 0.9rem; }

  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.9rem;
  }

  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    transition: transform 0.15s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .order-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--matcha);
    border-radius: 3px 0 0 3px;
  }

  .order-card.status-ready::before { background: var(--ready); }
  .order-card.status-done::before { background: var(--done); opacity: 0.5; }
  .order-card.status-done { opacity: 0.55; }

  .order-card:hover { transform: translateY(-1px); border-color: rgba(74,124,89,0.35); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.7rem;
  }

  .order-num {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .order-time {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .customer-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .order-desc {
    font-size: 0.85rem;
    color: rgba(232,240,233,0.75);
    line-height: 1.5;
    margin-bottom: 0.7rem;
  }

  .order-phone {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 80px;
    padding: 0.5rem 0.7rem;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn-ready {
    background: rgba(240,192,64,0.15);
    border: 1px solid rgba(240,192,64,0.3);
    color: var(--ready);
  }

  .btn-ready:hover { background: rgba(240,192,64,0.25); }

  .btn-done {
    background: rgba(90,158,106,0.15);
    border: 1px solid rgba(90,158,106,0.3);
    color: #7ece90;
  }

  .btn-done:hover { background: rgba(90,158,106,0.25); }

  .btn-pending {
    background: rgba(74,124,89,0.12);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-pending:hover { background: rgba(74,124,89,0.2); color: var(--text); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.8rem;
  }

  .badge-pending { background: rgba(74,124,89,0.15); color: var(--matcha-light); }
  .badge-ready { background: rgba(240,192,64,0.15); color: var(--ready); }
  .badge-done { background: rgba(90,158,106,0.12); color: #7ece90; }

  .refresh-note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span>🍵</span>
    <h1>Order Queue</h1>
    <div class="live-dot" title="Auto-refreshing"></div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num pending" id="pendingCount">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-num done" id="doneCount">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="divider"></div>
    <button class="clear-btn" onclick="clearDone()">Clear done</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-all" onclick="setTab('all')">All Orders</div>
  <div class="tab" id="tab-pending" onclick="setTab('pending')">Active</div>
  <div class="tab" id="tab-done" onclick="setTab('done')">Completed</div>
</div>

<div class="main" id="main">
  <div class="empty-state" id="emptyState">
    <div class="icon">🍵</div>
    <p>No orders yet.<br>Waiting for customers…</p>
  </div>
  <div class="orders-grid" id="ordersGrid"></div>
</div>

<div class="refresh-note" id="refreshNote">Auto-refreshing every 5 seconds</div>

<script>
  const STORAGE_KEY = 'matcha-orders-v1';
  let currentTab = 'all';
  let orders = [];

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderOrders();
  }

  async function loadOrders() {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      if (result) {
        orders = JSON.parse(result.value);
      } else {
        orders = [];
      }
    } catch(e) { orders = []; }
    renderOrders();
  }

  async function saveOrders() {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(orders), true);
    } catch(e) {}
  }

  async function updateStatus(id, status) {
    orders = orders.map(o => o.id === id ? {...o, status} : o);
    await saveOrders();
    renderOrders();
  }

  async function clearDone() {
    if (!confirm('Remove all completed orders from the list?')) return;
    orders = orders.filter(o => o.status !== 'done');
    await saveOrders();
    renderOrders();
  }

  function renderOrders() {
    let filtered = orders;
    if (currentTab === 'pending') filtered = orders.filter(o => o.status !== 'done');
    if (currentTab === 'done') filtered = orders.filter(o => o.status === 'done');

    const pending = orders.filter(o => o.status === 'pending').length;
    const ready = orders.filter(o => o.status === 'ready').length;
    const done = orders.filter(o => o.status === 'done').length;

    document.getElementById('pendingCount').textContent = pending + ready;
    document.getElementById('doneCount').textContent = done;

    const grid = document.getElementById('ordersGrid');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      if (currentTab === 'done') empty.querySelector('p').innerHTML = 'No completed orders yet.';
      else if (currentTab === 'pending') empty.querySelector('p').innerHTML = 'No active orders.<br>All caught up! 🎉';
      else empty.querySelector('p').innerHTML = 'No orders yet.<br>Waiting for customers…';
      return;
    }

    empty.style.display = 'none';

    grid.innerHTML = filtered.map(o => {
      const badgeClass = o.status === 'ready' ? 'badge-ready' : o.status === 'done' ? 'badge-done' : 'badge-pending';
      const badgeLabel = o.status === 'ready' ? '🔔 Ready' : o.status === 'done' ? '✓ Done' : '⏳ Pending';
      const statusClass = `status-${o.status}`;

      let actions = '';
      if (o.status === 'pending') {
        actions = `
          <button class="action-btn btn-ready" onclick="updateStatus(${o.id}, 'ready')">Mark Ready</button>
          <button class="action-btn btn-done" onclick="updateStatus(${o.id}, 'done')">Mark Done</button>
        `;
      } else if (o.status === 'ready') {
        actions = `
          <button class="action-btn btn-done" onclick="updateStatus(${o.id}, 'done')">Mark Done</button>
          <button class="action-btn btn-pending" onclick="updateStatus(${o.id}, 'pending')">Undo</button>
        `;
      } else {
        actions = `<button class="action-btn btn-pending" onclick="updateStatus(${o.id}, 'pending')">Reopen</button>`;
      }

      const phoneHtml = o.phone
        ? `<div class="order-phone">📱 ${o.phone}</div>`
        : '';

      return `
        <div class="order-card ${statusClass}">
          <div class="card-top">
            <span class="order-num">#${o.id}</span>
            <span class="order-time">${o.time}</span>
          </div>
          <div class="customer-name">${escapeHtml(o.name)}</div>
          <div class="order-desc">${escapeHtml(o.order)}</div>
          ${phoneHtml}
          <div class="status-badge ${badgeClass}">${badgeLabel}</div>
          <div class="actions">${actions}</div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auto-refresh every 5 seconds
  loadOrders();
  setInterval(() => {
    loadOrders();
  }, 5000);
</script>
</body>
</html>
