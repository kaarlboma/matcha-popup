<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff View — Matcha Popup</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --matcha: #4a7c59;
    --matcha-light: #6a9e78;
    --matcha-pale: #d4e8d8;
    --bg: #111a13;
    --surface: #1a2a1d;
    --border: rgba(74,124,89,0.2);
    --text: #e8f0e9;
    --muted: #7a9080;
    --ready-color: #f0c040;
    --done-color: #5a9e6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* TOPBAR */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.4rem; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 0.7rem; }
  .topbar h1 { font-family: 'Shippori Mincho', serif; font-size: 1.2rem; }
  .live-dot { width: 8px; height: 8px; background: #5fce7a; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
  .stats { display: flex; align-items: center; gap: 1rem; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 600; line-height: 1; }
  .stat-num.pending { color: var(--ready-color); }
  .stat-num.done { color: var(--matcha-light); }
  .stat-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.1rem; }
  .vdivider { width: 1px; height: 30px; background: var(--border); }
  .clear-btn {
    background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.25);
    color: #e07060; padding: 0.4rem 0.8rem; border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(192,57,43,0.2); }

  /* CONFIG BANNER */
  .config-banner {
    background: #2a2200; border-bottom: 1px solid #f0c040;
    padding: 0.9rem 1.4rem; font-size: 0.84rem; color: #f0c040; line-height: 1.5;
  }

  /* TABS */
  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 0 1.4rem;
  }
  .tab {
    padding: 0.65rem 1.1rem; font-size: 0.83rem; font-weight: 500;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; user-select: none;
  }
  .tab.active { color: var(--matcha-light); border-bottom-color: var(--matcha-light); }

  /* MAIN */
  .main { flex: 1; padding: 1.2rem 1.4rem; overflow-y: auto; }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; line-height: 1.6; }

  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 0.85rem;
  }

  /* ORDER CARD */
  .order-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.15rem;
    transition: transform 0.15s, border-color 0.2s, opacity 0.3s;
    position: relative; overflow: hidden;
  }
  .order-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 3px 0 0 3px;
    background: var(--matcha);
  }
  .order-card.status-ready::before { background: var(--ready-color); }
  .order-card.status-done::before { background: var(--done-color); opacity: 0.5; }
  .order-card.status-done { opacity: 0.5; }
  .order-card:hover { transform: translateY(-1px); border-color: rgba(74,124,89,0.35); }

  .card-meta { display: flex; justify-content: space-between; margin-bottom: 0.6rem; }
  .order-num { font-size: 0.68rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }
  .order-time { font-size: 0.68rem; color: var(--muted); }
  .customer-name { font-family: 'Shippori Mincho', serif; font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 0.35rem; }
  .order-desc { font-size: 0.83rem; color: rgba(232,240,233,0.72); line-height: 1.5; margin-bottom: 0.6rem; }
  .order-phone { font-size: 0.73rem; color: var(--muted); margin-bottom: 0.7rem; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.18rem 0.55rem; border-radius: 100px;
    font-size: 0.66rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 0.8rem;
  }
  .badge-pending { background: rgba(74,124,89,0.15); color: var(--matcha-light); }
  .badge-ready   { background: rgba(240,192,64,0.15); color: var(--ready-color); }
  .badge-done    { background: rgba(90,158,106,0.12); color: #7ece90; }

  .actions { display: flex; gap: 0.45rem; }
  .action-btn {
    flex: 1; padding: 0.48rem 0.6rem; border-radius: 7px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.76rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .btn-ready { background: rgba(240,192,64,0.12); border: 1px solid rgba(240,192,64,0.28); color: var(--ready-color); }
  .btn-ready:hover { background: rgba(240,192,64,0.22); }
  .btn-done  { background: rgba(90,158,106,0.12); border: 1px solid rgba(90,158,106,0.28); color: #7ece90; }
  .btn-done:hover  { background: rgba(90,158,106,0.22); }
  .btn-undo  { background: rgba(74,124,89,0.1); border: 1px solid var(--border); color: var(--muted); }
  .btn-undo:hover  { background: rgba(74,124,89,0.18); color: var(--text); }

  /* NEW ORDER flash */
  @keyframes flashIn {
    from { box-shadow: 0 0 0 3px rgba(95,206,122,0.6); }
    to   { box-shadow: none; }
  }
  .order-card.new-flash { animation: flashIn 1.2s ease-out; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span>🍵</span>
    <h1>Order Queue</h1>
    <div class="live-dot" title="Live updates on"></div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num pending" id="pendingCount">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="vdivider"></div>
    <div class="stat">
      <div class="stat-num done" id="doneCount">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="vdivider"></div>
    <button class="clear-btn" onclick="clearDone()">Clear done</button>
  </div>
</div>

<div class="config-banner" id="configBanner">
  ⚠️ Firebase not configured — open this file in a text editor and paste your Firebase config values. See SETUP-INSTRUCTIONS.txt.
</div>

<div class="tabs">
  <div class="tab active" id="tab-all"     onclick="setTab('all')">All</div>
  <div class="tab"        id="tab-active"  onclick="setTab('active')">Active</div>
  <div class="tab"        id="tab-done"    onclick="setTab('done')">Completed</div>
</div>

<div class="main" id="main">
  <div class="empty-state" id="emptyState">
    <div class="icon">🍵</div>
    <p>No orders yet.<br>Waiting for customers…</p>
  </div>
  <div class="orders-grid" id="ordersGrid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ================================================================
  // STEP 1: PASTE YOUR FIREBASE CONFIG VALUES BELOW
  // Must match exactly what you pasted in matcha-order.html
  // ================================================================
  const firebaseConfig = {
    apiKey:            "AIzaSyA7T3puAQVWESlCbu5bZRGyc6MLyowgj5M",
    authDomain:        "matcha-popup.firebaseapp.com",
    databaseURL:       "https://matcha-popup-default-rtdb.firebaseio.com",
    projectId:         "matcha-popup",
    storageBucket:     "matcha-popup.firebasestorage.app",
    messagingSenderId: "19045177210",
    appId:             "1:19045177210:web:09fb793fa9e5e5ec6f28c3"
  };
  // ================================================================

  const configured = !firebaseConfig.apiKey.includes("PASTE");
  if (configured) document.getElementById('configBanner').style.display = 'none';

  let currentTab = 'all';
  let allOrders = {}; // keyed by Firebase ID
  let knownIds = new Set();
  let db, ordersRef;

  window.setTab = function(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderOrders();
  };

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderOrders() {
    const entries = Object.entries(allOrders)
      .sort((a,b) => (b[1].createdAt||0) - (a[1].createdAt||0));

    let filtered = entries;
    if (currentTab === 'active') filtered = entries.filter(([,o]) => o.status !== 'done');
    if (currentTab === 'done')   filtered = entries.filter(([,o]) => o.status === 'done');

    const active = entries.filter(([,o]) => o.status !== 'done').length;
    const done   = entries.filter(([,o]) => o.status === 'done').length;
    document.getElementById('pendingCount').textContent = active;
    document.getElementById('doneCount').textContent   = done;

    const grid  = document.getElementById('ordersGrid');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      const p = empty.querySelector('p');
      if (currentTab === 'done')   p.innerHTML = 'No completed orders yet.';
      else if (currentTab === 'active') p.innerHTML = 'No active orders.<br>All caught up! 🎉';
      else p.innerHTML = 'No orders yet.<br>Waiting for customers…';
      return;
    }

    empty.style.display = 'none';

    grid.innerHTML = filtered.map(([fbId, o]) => {
      const badgeClass = o.status === 'ready' ? 'badge-ready' : o.status === 'done' ? 'badge-done' : 'badge-pending';
      const badgeLabel = o.status === 'ready' ? '🔔 Ready' : o.status === 'done' ? '✓ Done' : '⏳ Pending';
      const statusClass = `status-${o.status}`;

      let actions = '';
      if (o.status === 'pending') {
        actions = `
          <button class="action-btn btn-ready" onclick="setStatus('${fbId}','ready')">Mark Ready</button>
          <button class="action-btn btn-done"  onclick="setStatus('${fbId}','done')">Mark Done</button>`;
      } else if (o.status === 'ready') {
        actions = `
          <button class="action-btn btn-done" onclick="setStatus('${fbId}','done')">Mark Done</button>
          <button class="action-btn btn-undo" onclick="setStatus('${fbId}','pending')">Undo</button>`;
      } else {
        actions = `<button class="action-btn btn-undo" onclick="setStatus('${fbId}','pending')">Reopen</button>`;
      }

      const phoneHtml = o.phone ? `<div class="order-phone">📱 ${escHtml(o.phone)}</div>` : '';

      return `
        <div class="order-card ${statusClass}" id="card-${fbId}">
          <div class="card-meta">
            <span class="order-num">#${o.orderNumber || '–'}</span>
            <span class="order-time">${escHtml(o.time || '')}</span>
          </div>
          <div class="customer-name">${escHtml(o.name)}</div>
          <div class="order-desc">${escHtml(o.order)}</div>
          ${phoneHtml}
          <div class="status-badge ${badgeClass}">${badgeLabel}</div>
          <div class="actions">${actions}</div>
        </div>`;
    }).join('');
  }

  window.setStatus = async function(fbId, status) {
    if (!db) return;
    try {
      await update(ref(db, `orders/${fbId}`), { status });
    } catch(e) { console.error(e); alert('Could not update order. Check your connection.'); }
  };

  window.clearDone = async function() {
    if (!db) return;
    if (!confirm('Remove all completed orders?')) return;
    const doneIds = Object.entries(allOrders)
      .filter(([,o]) => o.status === 'done')
      .map(([id]) => id);
    for (const id of doneIds) {
      try { await remove(ref(db, `orders/${id}`)); } catch(e) {}
    }
  };

  if (configured) {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    ordersRef = ref(db, 'orders');

    // onValue fires immediately and on every change — this is the real-time magic
    onValue(ordersRef, (snapshot) => {
      const data = snapshot.val() || {};

      // Detect new orders (for flash animation)
      const newIds = Object.keys(data).filter(id => !knownIds.has(id));

      allOrders = data;
      Object.keys(data).forEach(id => knownIds.add(id));

      renderOrders();

      // Flash new cards
      newIds.forEach(id => {
        const card = document.getElementById(`card-${id}`);
        if (card) {
          card.classList.add('new-flash');
          setTimeout(() => card.classList.remove('new-flash'), 1200);
        }
      });
    });
  } else {
    renderOrders();
  }
</script>
</body>
</html>
